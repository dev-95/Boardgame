name: CI/CD Pipeline
on:
  push:
    branches: [ main ] # Triggers the pipeline whenever you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Uses a fresh Linux runner
    steps:
      - name: Checkout Code
        [cite_start]uses: actions/checkout@v3 # Clones your repo [cite: 191, 200]

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          [cite_start]distribution: 'temurin' # Industry standard for Java projects [cite: 43, 81]

      - name: Build with Maven
        [cite_start]run: mvn clean package # Packages your code into the JAR file [cite: 19, 98]

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t devesh0905/boardgame:v1 . # Build image [cite: 20, 115]
          docker push devesh0905/boardgame:v1 # Push image to Docker Hub [cite: 127, 194]
